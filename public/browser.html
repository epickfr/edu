<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoxyEdu Browser</title>

    <!-- Scripts in correct order -->
    <script src="/scram/scramjet.all.js"></script>
    <script src="/baremux/index.js"></script>
    <script src="/epoxy/index.js"></script>
    <script src="/register-sw.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #f0f2f5;
            color: #1f1f1f;
            height: 100vh;
            overflow: hidden;
        }
        .browser-container { display: flex; flex-direction: column; height: 100vh; }
        .browser-topbar {
            background: #ffffff;
            border-bottom: 1px solid #e0e0e0;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .nav-btn {
            background: transparent;
            border: none;
            color: #5f6368;
            width: 36px; height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }
        .nav-btn:hover { background: rgba(60,64,67,0.08); }
        .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .url-container {
            flex: 1;
            background: #f1f3f4;
            border-radius: 999px;
            padding: 0 16px;
            height: 40px;
            display: flex;
            align-items: center;
            border: 1px solid #dadce0;
        }
        #browser-url-input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 15px;
            color: #202124;
        }
        #browser-go-btn {
            background: none;
            border: none;
            color: #1a73e8;
            font-weight: 600;
            cursor: pointer;
            padding: 0 12px;
        }
        .browser-tabs {
            background: #f8f9fa;
            display: flex;
            align-items: flex-end;
            height: 44px;
            padding: 0 8px;
            border-bottom: 1px solid #e0e0e0;
            overflow-x: auto;
        }
        .browser-tab {
            display: flex;
            align-items: center;
            background: #e8eaed;
            padding: 0 16px;
            height: 36px;
            margin-right: 4px;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            min-width: 140px;
            max-width: 280px;
            user-select: none;
        }
        .browser-tab.active {
            background: white;
            box-shadow: 0 -2px 0 white, 0 0 0 1px #dadce0;
            color: #000;
        }
        .tab-favicon { width: 16px; height: 16px; margin-right: 8px; }
        .tab-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }
        .tab-close { margin-left: 8px; font-size: 18px; color: #5f6368; }
        .tab-close:hover { color: #d93025; }
        #new-tab-btn {
            background: transparent;
            border: none;
            color: #1a73e8;
            font-size: 24px;
            width: 36px; height: 36px;
            cursor: pointer;
        }
        .browser-content { flex: 1; position: relative; background: white; }
        .tab-content { position: absolute; inset: 0; display: none; }
        .tab-content.active { display: block; }
        .sj-frame { width: 100%; height: 100%; border: none; }
        .tab-loading {
            position: absolute; inset: 0;
            background: rgba(255,255,255,0.95);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 10;
        }
        .tab-loading-spinner {
            width: 48px; height: 48px;
            border: 5px solid #e0e0e0;
            border-top: 5px solid #1a73e8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .tab-error {
            position: absolute; inset: 0;
            background: white; color: #d93025;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .tab-error button {
            margin: 10px;
            padding: 10px 20px;
            background: #1a73e8; color: white;
            border: none; border-radius: 24px;
            cursor: pointer;
        }
        .status-bar {
            background: #f1f3f4;
            border-top: 1px solid #dadce0;
            color: #5f6368;
            font-size: 13px;
            padding: 6px 12px;
        }
    </style>
</head>
<body>
    <div class="browser-container">
        <div class="browser-topbar">
            <button class="nav-btn" id="back-btn" title="Back" disabled>←</button>
            <button class="nav-btn" id="forward-btn" title="Forward" disabled>→</button>
            <button class="nav-btn" id="reload-btn" title="Reload">↻</button>

            <form id="browser-url-form" class="url-container">
                <input id="browser-url-input" type="text" placeholder="Search or enter website..." autocomplete="off" />
                <button id="browser-go-btn" type="submit">Go</button>
            </form>

            <button class="nav-btn" id="home-btn" title="Home">🏠</button>
            <button class="nav-btn" id="new-tab-btn2" title="New Tab">+</button>
        </div>

        <div class="browser-tabs" id="browser-tabs-container"></div>

        <div class="browser-content" id="browser-content-area"></div>

        <div class="status-bar" id="status-bar">
            <span id="status-text">Ready</span>
        </div>
    </div>

    <script>
        class DoxyEduTabbedBrowser {
            constructor() {
                this.tabs = new Map();
                this.activeTabId = null;
                this.tabCounter = 0;
                this.searchEngine = 'https://www.google.com/search?q=%s';
                this.scramjet = null;
                this.connection = null;
                this.initialized = false;
                this.init();
            }

            async init() {
                console.log('Initializing DoxyEdu Browser...');
                try {
                    this.initUI();
                    await this.waitForScriptsWithRetry(100, 60); // Retry more aggressively
                    await this.initScramjetAndBareMux();
                    this.initialized = true;
                    this.createTab('https://www.google.com');
                    console.log('Browser ready!');
                } catch (err) {
                    console.error('Init failed:', err);
                    this.showGlobalError('Initialization failed: ' + err.message + '. Reload or check console.');
                }
            }

            async waitForScriptsWithRetry(interval = 100, maxAttempts = 100) {
                return new Promise((resolve, reject) => {
                    let attempts = 0;
                    const check = () => {
                        attempts++;
                        if (typeof BareMux?.BareMuxConnection === 'function' &&
                            typeof $scramjetLoadController === 'function') {
                            console.log('Scripts loaded');
                            resolve();
                        } else if (attempts >= maxAttempts) {
                            reject(new Error('Timeout waiting for Scramjet/BareMux'));
                        } else {
                            setTimeout(check, interval);
                        }
                    };
                    check();
                });
            }

            async initScramjetAndBareMux() {
                const { ScramjetController } = $scramjetLoadController();
                this.scramjet = new ScramjetController({
                    files: {
                        wasm: '/scram/scramjet.wasm.wasm',
                        all: '/scram/scramjet.all.js',
                        sync: '/scram/scramjet.sync.js',
                    },
                });
                await this.scramjet.init();

                this.connection = new BareMux.BareMuxConnection("/baremux/worker.js");
                const wispUrl = `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/wisp/`;
                await this.connection.setTransport("/epoxy/index.mjs", [{ wisp: wispUrl }]);
            }

            initUI() {
                // ... (your existing event listeners for form, buttons, etc.)
                this.urlForm = document.getElementById('browser-url-form');
                this.urlInput = document.getElementById('browser-url-input');
                this.tabsContainer = document.getElementById('browser-tabs-container');
                this.contentArea = document.getElementById('browser-content-area');
                this.statusText = document.getElementById('status-text');

                this.urlForm.addEventListener('submit', e => { e.preventDefault(); this.navigateTo(this.urlInput.value.trim()); });
                document.getElementById('back-btn').onclick = () => this.navigateBack();
                document.getElementById('forward-btn').onclick = () => this.navigateForward();
                document.getElementById('reload-btn').onclick = () => this.reloadPage();
                document.getElementById('home-btn').onclick = () => this.goHome();
                document.getElementById('new-tab-btn2').onclick = () => this.createTab();

                const newTabBtn = document.createElement('button');
                newTabBtn.id = 'new-tab-btn';
                newTabBtn.textContent = '+';
                newTabBtn.onclick = () => this.createTab();
                this.tabsContainer.appendChild(newTabBtn);
            }

            async createTab(url = 'https://www.google.com') {
                this.tabCounter++;
                const tabId = `tab-${this.tabCounter}`;
                const normalized = this.normalizeUrl(url);

                const tab = {
                    id: tabId,
                    url: normalized,
                    title: 'New Tab',
                    history: [normalized],
                    historyIndex: 0,
                    frame: null,
                    isLoading: false
                };
                this.tabs.set(tabId, tab);

                this.createTabUI(tabId);
                await this.loadUrlInTab(tabId, normalized);
                this.setActiveTab(tabId);
            }

            // ... (keep your createTabUI, but add better favicon fallback)

            async loadUrlInTab(tabId, url) {
                const tab = this.tabs.get(tabId);
                if (!tab) return;

                tab.url = this.normalizeUrl(url);
                this.showLoading(tabId, true);
                this.showStatus(`Loading ${tab.url}...`);

                try {
                    await registerSW(); // Ensure SW is registered

                    const contentEl = document.getElementById(`tab-content-${tabId}`);
                    if (!tab.frame) {
                        const frame = this.scramjet.createFrame();
                        frame.frame.className = 'sj-frame';
                        frame.frame.id = `sj-frame-${tabId}`;
                        tab.frame = frame;
                        contentEl.appendChild(frame.frame);

                        this.setupFrameEvents(tabId, frame);
                    }

                    tab.frame.go(tab.url);
                    this.addToHistory(tabId, tab.url);
                    if (this.activeTabId === tabId) this.urlInput.value = tab.url;
                } catch (err) {
                    console.error(err);
                    this.showTabError(tabId, 'Load failed: ' + err.message + '. Retrying...');
                    setTimeout(() => this.loadUrlInTab(tabId, url), 1500); // Auto-retry once
                }
            }

            setupFrameEvents(tabId, frame) {
                frame.frame.addEventListener('load', () => this.handleFrameLoad(tabId));
                frame.frame.addEventListener('error', e => this.handleFrameError(tabId, e));

                // Better title/favicon capture (with fallback)
                const tryUpdate = () => {
                    try {
                        const doc = frame.frame.contentDocument;
                        if (doc) {
                            const title = doc.title || new URL(tab.url).hostname;
                            this.updateTabTitle(tabId, title);
                            // Favicon attempt
                            const favicon = `${new URL(tab.url).origin}/favicon.ico`;
                            const favEl = document.querySelector(`.browser-tab[data-tab-id="${tabId}"] .tab-favicon`);
                            if (favEl) favEl.src = favicon;
                        }
                    } catch {} // cross-origin ok, fallback to hostname
                };
                setTimeout(tryUpdate, 1500); // Delay for doc ready
            }

            // ... (keep handleFrameLoad, handleFrameError, showLoading, showTabError, etc.)

            // Add retry button logic in showTabError
            // e.g., button onclick = () => this.loadUrlInTab(tabId, tab.url)

            // Your other methods (navigateBack, forward, reload, normalizeUrl, etc.) remain similar

            showStatus(msg, timeout = 3000) {
                this.statusText.textContent = msg;
                if (timeout) setTimeout(() => this.statusText.textContent = 'Ready', timeout);
            }
        }

        // Global init
        document.addEventListener('DOMContentLoaded', () => {
            window.browser = new DoxyEduTabbedBrowser();
        });
    </script>
</body>
</html>
